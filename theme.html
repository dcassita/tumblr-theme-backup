<!DOCTYPE html>
<html>
<head>
 
<title>{block:TagPage}#{Tag} ★ {/block:TagPage} {block:PostSummary}{PostSummary} ★ {/block:PostSummary}{Title}</title>
 
<link rel="shortcut icon" href="{Favicon}">
<link rel="alternate" type="application/rss+xml" href="{RSS}">
{block:Description}<meta name="description" content="{MetaDescription}" />{/block:Description}

<meta name="text:Tall Posts Tag" content="the tag you use for tall posts" />
<meta name="text:Wide Posts Tag" content="destaque" />
<meta name="text:P5 Embed Tag" content="p5" />
<meta name="text:P5 Embed Height" content="680px" />
<meta name="text:Custom Link 1" content="Custom 1" />
<meta name="text:Custom Link 1 URL" content="http://" />
<meta name="text:Custom Link 2" content="Custom 2" />
<meta name="text:Custom Link 2 URL" content="https://" />
<meta name="color:Accent" content="#fc7045" />
<meta name="if:White Post Border" content="0" />
<meta name="if:Custom Links" content="1" />
<meta name="if:Simple Ask" content="0" />
<meta name="if:Quote Background" content="0" />
<meta name="if:Simple Caption" content="0" />
<meta name="if:Hide Tags On Index Page" content="0" />
<meta name="select:Content Alignment" content="align-top" title="Top">
<meta name="select:Content Alignment" content="align-middle" title="Middle">
<meta name="select:Font" content="Karla" title="Karla">
<meta name="select:Font" content="Roboto Mono" title="Roboto Mono">

<link href="https://static.tumblr.com/qudkd6d/OcDnl99gb/style.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css?family={select:Font}:400,400italic,700,700italic" rel="stylesheet"/>
<link href="//solrainha.github.io/honeybee/honeybee.css" rel="stylesheet"/>
<link href="//static.tumblr.com/gtjt4bo/mXBrpdj0n/unblue-polls.css" rel="stylesheet">

<style type="text/css">

:root {--normal-post-height: 340px;}

@media (max-width: 850px) { 
:root {--normal-post-height: 400px;}
}
@media (max-width: 450px) { 
:root {--normal-post-height: 450px;}
}

.poll-post {
--Poll-Question-Font-Size: 10px;
--Poll-Option-Background-Color: #fff;
--Poll-Option-Corner-Rounding: 3px;
--Poll-Option-Border-Size: 1px;
--Poll-Option-Border-Color: #eee;
--Poll-Option-Padding: 5px;
--Poll-Option-Font-Size: 10px;
--Poll-Option-Spacing: 5px;
--Poll-Option-Text-Color: #888888;
--Poll-Option-HOVER-Border-Color: {color:Accent};
--Poll-Option-HOVER-Background-Color: #fff;
--Poll-Option-HOVER-Text-Color: {color:Accent};
--Poll-Option-HOVER-Speed: 0.4s;
}

* {-webkit-transition: all 0.7s ease-in-out;-moz-transition: all 0.7s ease-in-out;-o-transition: all 0.7s ease-in-out;transition: all 0.7s ease-in-out;}
.tmblr-iframe--unified-controls {z-index: 999999 !important; top: -4px !important; max-width: 500px !important;}

/* general stuff */
body {-webkit-font-smoothing: antialiased;-moz-osx-font-smoothing: grayscale;font-family: '{select:Font}';font-size: 9px;color: #888888;line-height: 1.5em;letter-spacing: .15px;background-color: #f5f5f5;margin: 0;padding: 0;word-break: break-word;}
body.Karla {font-size: 10px;}

a {font-weight: 300; text-decoration: none; color: #444;}
a:hover {color: {color:Accent} !important;}

/* content */
#main {width: 780px;margin: 80px auto;}

/* posts */
#posts {{block:IndexPage}display: grid;grid-template-columns: repeat(3, 1fr);grid-gap: 20px;grid-auto-rows: minmax(var(--normal-post-height), auto);grid-auto-flow: row dense;{/block:IndexPage}}

.post {{block:IndexPage}height:var(--normal-post-height);{/block:IndexPage}{block:PermalinkPage}width: 540px; margin: auto;{/block:PermalinkPage}overflow: hidden;background-color: #fff;{block:IfNotWhitePostBorder}border: 1px solid #eee;{/block:IfNotWhitePostBorder}{block:IfWhitePostBorder}border: 3px solid #fff;{/block:IfWhitePostBorder}border-radius: 3px;position: relative;}

/* P5 SPECIFIC FIXES */
.p5-embed-active {
    display: block !important;
    min-height: var(--normal-post-height) !important;
    height: var(--normal-post-height) !important;
    position: relative !important;
    padding: 0 !important;
}

.p5-embed-active iframe {
    width: 100% !important;
    height: 100% !important;
    border: none !important;
}

/* top bar + footer */
nav, footer {position: fixed;left: 0;line-height:100%;padding: 18px 0;width: 100%;background-color: #fff;z-index: 99999;text-transform: uppercase;text-align: center;font-weight: 400;letter-spacing: 1px;}
nav {top: 0px;border-bottom: 1px solid #eee;color: #111;}
nav a, nav .title {margin: 2px 6px;}
nav a {color: #aaa;}
nav .title {color: {color:Accent};font-weight: 700;}
footer {bottom: 0px;border-top: 1px solid #eee;font-size: 9px;}

</style>
</head>
<body class="{select:Font}">

<nav>
<span class="title">{Title}</span> <a href="/" title="Refresh">home</a> <a href="/ask" title="Message">message</a> <a href="/archive" title="Archive">archive</a>
</nav>

<div id="main">
<div id="posts">
{block:Posts}
<article class="post fadeIn {select:Content Alignment} {TagsAsClasses}" data-tag="{TagsAsClasses}">

{block:Link}
<div class="link-post">
    <div class="link"><a href="{URL}">{Name}</a></div>
</div>
{/block:Link}

{block:Photo}
<div class="photo" style="background-image:url('{PhotoURL-HighRes}');"></div>
{/block:Photo}

{block:Text}
<div class="text-post">{Body}</div>
{/block:Text}

</article>
{/block:Posts}
</div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script>
$(document).ready(function(){
    function converterP5() {
        var minhaTag = "{text:P5 Embed Tag}" || "p5";
        
        $('.post').each(function(){
            var $estePost = $(this);
            if (($estePost.hasClass(minhaTag) || $estePost.html().indexOf('p5js.org') > -1) && !$estePost.data('p5-ready')) {
                var linkP5 = $estePost.find('a[href*="p5js.org"]').attr('href');
                if (linkP5) {
                    var urlLimpa = linkP5.replace('/sketches/', '/full/').replace('/present/', '/full/');
                    var estrutura = $('<div style="width:100%; height:var(--normal-post-height); background:#fff; overflow:hidden; position:relative; z-index:9999;"><iframe src="'+urlLimpa+'" style="width:100%; height:100%; border:none; pointer-events:auto;"></iframe></div>');
                    $estePost.prepend(estrutura);
                    $estePost.data('p5-ready', true);
                    $estePost.addClass('p5-embed-active');
                    $estePost.find('.link-post, .text-post, .photo').hide();
                }
            }
        });
    }

    converterP5();
    setTimeout(converterP5, 1500);
    $(window).scroll(function() { converterP5(); });
});
</script>
</body>
</html>
